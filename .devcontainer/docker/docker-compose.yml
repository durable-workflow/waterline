services:
    laravel:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                WWWGROUP: '1000'
        image: sail-8.4/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '1000'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
        volumes:
            - '../..:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
            - pgsql
            - mssql
    mssql:
        # SQL Server Linux containers are supported on x86-64 only.
        platform: linux/amd64
        # Build locally from Microsoft Ubuntu packages instead of pulling from MCR.
        build:
            context: .
            dockerfile: mssql/Dockerfile
        image: waterline-mssql:2022-ubuntu-22.04
        ports:
            - '${FORWARD_MSSQL_PORT:-1433}:1433'
        environment:
            ACCEPT_EULA: 'Y'
            MSSQL_PID: '${MSSQL_PID:-Developer}'
            MSSQL_SA_PASSWORD: '${MSSQL_SA_PASSWORD:-P@ssword}'
        volumes:
            - 'sail-mssql:/var/opt/mssql'
        networks:
            - sail
        healthcheck:
            test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -C -b -o /dev/null || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -b -o /dev/null"]
            interval: 10s
            timeout: 3s
            retries: 10
            start_period: 10s
    mysql:
        image: 'mysql/mysql-server:8.0'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-password}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE:-testing}'
            MYSQL_USER: '${DB_USERNAME:-testing}'
            MYSQL_PASSWORD: '${DB_PASSWORD:-password}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            - './create-testing-database-mysql.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD:-password}"]
            retries: 3
            timeout: 5s
    pgsql:
        image: 'postgres:15'
        ports:
            - '${FORWARD_PGSQL_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-password}'
            POSTGRES_DB: '${DB_DATABASE:-testing}'
            POSTGRES_USER: '${DB_USERNAME:-testing}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-password}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
            - './create-testing-database-pgsql.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE:-testing}", "-U", "${DB_USERNAME:-testing}"]
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            retries: 3
            timeout: 5s
networks:
    sail:
        driver: bridge
volumes:
    sail-mssql:
        driver: local
    sail-mysql:
        driver: local
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
